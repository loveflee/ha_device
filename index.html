<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devices.json 節點生成器 (Schema Builder)</title>
    <style>
        :root { --bg: #1e1e1e; --panel: #2d2d2d; --text: #d4d4d4; --accent: #007acc; --border: #404040; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 900px; margin: 0 auto; display: flex; gap: 20px; }
        .form-panel, .output-panel { background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid var(--border); flex: 1; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; font-weight: bold; color: #9cdcfe; }
        input, select { width: 100%; padding: 8px; background: #3c3c3c; border: 1px solid var(--border); color: #fff; border-radius: 4px; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        input:disabled, select:disabled { opacity: 0.6; cursor: not-allowed; }
        .influx-section { border-left: 3px solid #c586c0; padding-left: 15px; margin-top: 15px; display: none; }
        .influx-section.active { display: block; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .checkbox-group input { width: auto; }
        pre { background: #1e1e1e; padding: 15px; border-radius: 4px; overflow-x: auto; border: 1px solid var(--border); color: #ce9178; white-space: pre-wrap; word-wrap: break-word;}
        button { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #005999; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
    </style>
</head>
<body>

    <div class="form-panel">
        <div class="form-group">
            <label>顯示名稱 (Key, 例: 5樓溫度)</label>
            <input type="text" id="nodeName" oninput="generateJSON()" placeholder="輸入名稱...">
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>Entity ID (id)</label>
                <input type="text" id="entityId" oninput="generateJSON()" placeholder="sensor.xxx">
            </div>
            <div class="form-group">
                <label>Domain</label>
                <select id="domain" onchange="handleDomainChange()">
                    <option value="switch">switch (控制)</option>
                    <option value="sensor">sensor (感測器)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="type" disabled>
                    <option value="control">control</option>
                    <option value="sensor">sensor</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Aliases (別名，用逗號分隔)</label>
            <input type="text" id="aliases" oninput="generateJSON()" placeholder="手動補充別名...">
        </div>

        <div class="checkbox-group" id="influxToggleWrapper" style="display: none;">
            <input type="checkbox" id="enableInflux" onchange="toggleInflux()">
            <label for="enableInflux" style="margin: 0; color: #c586c0;">啟用 InfluxDB 配置</label>
        </div>

        <div class="influx-section" id="influxSection">
            <div class="row">
                <div class="form-group">
                    <label>Measurement</label>
                    <input type="text" id="inf_measurement" value="irongate" oninput="generateJSON()" list="measurement-options">
                    <datalist id="measurement-options">
                        <option value="irongate"></option>
                        <option value="power_meter"></option>
                    </datalist>
                </div>
                <div class="form-group">
                    <label>Field</label>
                    <input type="text" id="inf_field" value="temperature" oninput="generateJSON()">
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Tag Key</label>
                    <input type="text" id="inf_tag_key" value="device" oninput="generateJSON()">
                </div>
                <div class="form-group">
                    <label>Tag Value</label>
                    <input type="text" id="inf_tag_val" oninput="generateJSON()" placeholder="對應硬體ID">
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Calc Mode</label>
                    <select id="inf_calc_mode" onchange="generateJSON()">
                        <option value="aggregate">aggregate (狀態聚合，如溫濕度)</option>
                        <option value="increase">increase (累加計算，如電表度數)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>單位 (Unit)</label>
                    <input type="text" id="inf_unit" value="°C" oninput="generateJSON()">
                </div>
                <div class="form-group">
                    <label>圖表名稱 (Name)</label>
                    <input type="text" id="inf_name" value="溫度" oninput="generateJSON()">
                </div>
            </div>
        </div>
    </div>

    <div class="output-panel">
        <button onclick="copyJSON()">複製 JSON 區塊</button>
        <pre id="jsonOutput">{}</pre>
    </div>

    <script>
        // 1. 強制綁定 Domain 與 Type
        function handleDomainChange() {
            const domain = document.getElementById('domain').value;
            const typeSelect = document.getElementById('type');
            const influxToggleWrapper = document.getElementById('influxToggleWrapper');
            const enableInflux = document.getElementById('enableInflux');
            const influxSection = document.getElementById('influxSection');

            if (domain === 'sensor') {
                typeSelect.value = 'sensor';
                influxToggleWrapper.style.display = 'flex';
            } else {
                typeSelect.value = 'control';
                influxToggleWrapper.style.display = 'none';
                enableInflux.checked = false;
                influxSection.classList.remove('active');
            }
            generateJSON();
        }

        function toggleInflux() {
            const isChecked = document.getElementById('enableInflux').checked;
            document.getElementById('influxSection').classList.toggle('active', isChecked);
            generateJSON();
        }

        // 自動推導 Alias 邏輯
        function autoAlias(name) {
            let aliases = [name.toLowerCase()];
            // 替換「樓」為「f」
            if (name.includes("樓")) {
                aliases.push(name.replace("樓", "f").toLowerCase());
            }
            // 數字轉中文 (針對常用樓層)
            const numMap = {'1':'一', '2':'二', '3':'三', '4':'四', '5':'五'};
            for (let [num, zh] of Object.entries(numMap)) {
                if (name.includes(num)) {
                    aliases.push(name.replace(num, zh).toLowerCase());
                }
            }
            return aliases;
        }

        function generateJSON() {
            const nodeName = document.getElementById('nodeName').value.trim();
            const entityId = document.getElementById('entityId').value.trim();
            const jsonOutput = document.getElementById('jsonOutput');

            // 2. 必填欄位檢查
            if (!nodeName || !entityId) {
                jsonOutput.textContent = "// 🚨 阻擋：請先填寫「顯示名稱」與「Entity ID」";
                return;
            }

            // 3. Measurement 嚴格限制
            const validMeasurements = ["irongate", "power_meter"];
            const isInfluxEnabled = document.getElementById('enableInflux').checked;
            const measurement = document.getElementById('inf_measurement').value.trim();
            
            if (isInfluxEnabled && !validMeasurements.includes(measurement)) {
                jsonOutput.textContent = "// 🚨 阻擋：Measurement 只能輸入 irongate 或 power_meter\n// 避免未來時序資料庫查詢爆炸";
                return;
            }

            const obj = {
                id: entityId,
                domain: document.getElementById('domain').value,
                type: document.getElementById('type').value
            };

            // 4. Alias 自動推導 + 手動清洗 (Trim, Lowercase, 去空值)
            let finalAliases = new Set(autoAlias(nodeName)); // 用 Set 防止重複
            
            const aliasesRaw = document.getElementById('aliases').value;
            if (aliasesRaw.trim()) {
                aliasesRaw.split(/[,，]/).forEach(s => {
                    const clean = s.trim().toLowerCase();
                    if (clean.length > 0) finalAliases.add(clean);
                });
            }

            const aliasArray = Array.from(finalAliases);
            if (aliasArray.length > 0) {
                obj.alias = aliasArray;
            }

            if (isInfluxEnabled) {
                obj.influx = {
                    measurement: measurement,
                    tag_key: document.getElementById('inf_tag_key').value.trim(),
                    tag_val: document.getElementById('inf_tag_val').value.trim(),
                    field: document.getElementById('inf_field').value.trim(),
                    calc_mode: document.getElementById('inf_calc_mode').value,
                    unit: document.getElementById('inf_unit').value.trim(),
                    name: document.getElementById('inf_name').value.trim()
                };
            }

            let outputStr = `"${nodeName}": ${JSON.stringify(obj, null, 2)}`;

            // 5. Sensor 缺乏 Alias 提醒
            if (obj.type === "sensor" && (!obj.alias || obj.alias.length === 0)) {
                outputStr = "// ⚠️ 警告：建議 Sensor 設定 Alias，否則 AI / NLP 查詢可能對應不到實體\n" + outputStr;
            }

            jsonOutput.textContent = outputStr;
        }

        function copyJSON() {
            const text = document.getElementById('jsonOutput').textContent;
            if (text.startsWith("// 🚨")) return; // 有錯誤不給複製

            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('button');
                btn.textContent = "已複製！";
                btn.style.background = "#4CAF50";
                setTimeout(() => {
                    btn.textContent = "複製 JSON 區塊";
                    btn.style.background = "var(--accent)";
                }, 1500);
            });
        }
        
        // Init
        handleDomainChange();
    </script>
</body>
</html>
